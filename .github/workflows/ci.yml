name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-macos:
    name: Test (macOS, Xcode 26.3)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Select Xcode 26.3
        run: sudo xcode-select -s /Applications/Xcode_26.3.app
      - name: Run tests
        run: ./script/test

